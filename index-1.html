<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>منصة الحوكمة المؤسسية | دائرة صحة البصرة</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&family=IBM+Plex+Sans+Arabic:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0E2E2C; --teal-deep:#0F3D3E; --teal:#175B57; --teal-soft:#E7F0EE;
    --gold:#C9A227; --gold-soft:#F6EDD2; --paper:#F7F5F0; --card:#FFFFFF; --line:#E1DED4;
    --red:#B0392B; --red-soft:#FBE9E6; --amber:#C08A1E; --amber-soft:#FBF1DC;
    --green:#2E7D5B; --green-soft:#E7F4ED; --muted:#6B6A63;
  }
  *{box-sizing:border-box;}
  html,body{overflow-x:hidden;width:100%;}
  body{margin:0;font-family:'IBM Plex Sans Arabic',sans-serif;background:var(--paper);color:var(--ink);}
  h1,h2,h3,.display{font-family:'Cairo',sans-serif;}
  .app{display:grid;grid-template-columns:240px 1fr;min-height:100vh;}
  nav.sidebar{background:var(--teal-deep);color:#EDEDE6;padding:24px 16px;position:sticky;top:0;height:100vh;overflow-y:auto;display:flex;flex-direction:column;}
  nav.sidebar .brand{display:flex;align-items:center;gap:10px;margin-bottom:6px;}
  nav.sidebar .brand .mark{width:36px;height:36px;border-radius:9px;background:linear-gradient(145deg,var(--gold),#a97f16);display:flex;align-items:center;justify-content:center;font-family:'Cairo';font-weight:800;color:var(--teal-deep);font-size:14px;flex-shrink:0;}
  nav.sidebar .brand .t1{font-family:'Cairo';font-weight:800;font-size:14px;line-height:1.3;}
  nav.sidebar .brand .t2{font-size:10.5px;color:#B9CFCB;}
  nav.sidebar .divider{height:1px;background:rgba(255,255,255,.12);margin:16px 0;}
  nav.sidebar .navlabel{font-size:10.5px;color:#8fada7;font-weight:700;letter-spacing:.4px;margin:4px 6px 8px;}
  nav.sidebar .navitem{display:flex;align-items:center;gap:9px;padding:9px 11px;border-radius:8px;color:#D9E4E1;cursor:pointer;font-size:13px;margin-bottom:2px;}
  nav.sidebar .navitem:hover{background:rgba(255,255,255,.06);}
  nav.sidebar .navitem.active{background:var(--gold);color:var(--teal-deep);font-weight:700;}
  nav.sidebar .navitem .ic{width:16px;text-align:center;font-size:13.5px;}
  nav.sidebar .foot{margin-top:auto;padding-top:14px;}
  nav.sidebar .audit-link{display:flex;align-items:center;gap:7px;font-size:11px;color:#93A9A5;cursor:pointer;padding:6px;}
  nav.sidebar .audit-link:hover{color:#EDEDE6;}

  main{padding:24px 32px 56px;max-width:1180px;}
  header.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;flex-wrap:wrap;gap:12px;}
  header.topbar .page-title{font-family:'Cairo';font-weight:800;font-size:22px;color:var(--teal-deep);}
  header.topbar .page-sub{color:var(--muted);font-size:12.5px;margin-top:2px;}
  .rolebar{display:flex;align-items:center;gap:9px;background:var(--card);border:1px solid var(--line);padding:7px 11px;border-radius:11px;font-size:12px;}
  .rolebar select{border:none;background:var(--teal-soft);color:var(--teal-deep);font-family:inherit;font-weight:600;padding:6px 9px;border-radius:7px;font-size:12px;}
  .rolebar .who{color:var(--muted);}

  .search-wrap{position:relative;}
  .search-wrap input{border:1.5px solid var(--gold);background:var(--card);padding:9px 14px;border-radius:9px;font-family:inherit;font-size:13px;width:300px;max-width:100%;}
  .search-results{position:absolute;top:calc(100% + 8px);left:0;right:0;min-width:420px;background:var(--card);border:1px solid var(--line);border-radius:12px;box-shadow:0 14px 30px rgba(15,61,62,.16);max-height:70vh;overflow-y:auto;-webkit-overflow-scrolling:touch;z-index:60;display:none;}
  .search-result{padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--line);}
  .search-result:hover{background:var(--teal-soft);}

  .grid{display:grid;gap:14px;}
  .g4{grid-template-columns:repeat(4,1fr);} .g3{grid-template-columns:repeat(3,1fr);} .g2{grid-template-columns:repeat(2,1fr);}
  @media(max-width:1000px){.g4{grid-template-columns:repeat(2,1fr);}.g3{grid-template-columns:repeat(2,1fr);}}

  /* ===================== Hamburger + off-canvas drawer (mobile/tablet only) ===================== */
  .hamburger{display:none;}
  .sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(14,46,44,.45);z-index:65;}
  .sidebar-overlay.open{display:block;}

  @media(max-width:760px){
    html,body{overflow-x:hidden;}

    .hamburger{
      display:flex;align-items:center;justify-content:center;
      position:fixed;top:calc(env(safe-area-inset-top,0px) + 10px);left:calc(env(safe-area-inset-left,0px) + 14px);
      width:44px;height:44px;min-width:44px;min-height:44px;border-radius:10px;
      background:var(--teal-deep);color:#fff;font-size:19px;border:none;z-index:75;
      box-shadow:0 4px 12px rgba(0,0,0,.22);cursor:pointer;
    }

    .app{grid-template-columns:1fr;}

    nav.sidebar{
      position:fixed;top:0;right:0;bottom:0;z-index:70;
      width:82%;max-width:300px;
      height:100vh;height:100dvh;
      padding:24px 16px 14px;
      padding-top:calc(env(safe-area-inset-top,0px) + 24px);
      padding-bottom:calc(env(safe-area-inset-bottom,0px) + 14px);
      padding-right:calc(env(safe-area-inset-right,0px) + 16px);
      transform:translateX(100%);
      transition:transform .25s ease;
      -webkit-overflow-scrolling:touch;
      box-shadow:-8px 0 24px rgba(0,0,0,.18);
    }
    nav.sidebar.sidebar-open{ transform:translateX(0); }

    main{padding:16px 12px 44px;padding-top:calc(env(safe-area-inset-top,0px) + 64px);max-width:100%;overflow-x:hidden;}

    .grid.g4{grid-template-columns:repeat(2,1fr);} .grid.g3{grid-template-columns:1fr;} .grid.g2{grid-template-columns:1fr;}
    @media(max-width:400px){ .grid.g4{grid-template-columns:1fr;} }

    /* Topbar: stack title / search / role selector cleanly, no crowding */
    header.topbar{flex-direction:column;align-items:stretch;gap:10px;}
    .rolebar{width:100%;flex-direction:column;align-items:stretch;gap:9px;padding:10px;}
    .rolebar .who{align-self:flex-start;}
    .search-wrap{width:100%;}
    .search-wrap input{width:100%;font-size:16px;padding:11px 14px;} /* 16px avoids iOS Safari auto-zoom on focus */
    .search-results{position:fixed;left:10px;right:10px;top:auto;min-width:0;width:auto;max-height:min(65vh,65dvh);}
    #roleSelect,#deptScopeSelect{width:100%;font-size:16px;padding:10px 12px;min-height:44px;}

    /* Touch targets: minimum 44x44, more breathing room between adjacent controls */
    nav.sidebar .navitem{min-height:44px;padding:11px 12px;margin-bottom:4px;font-size:14px;}
    nav.sidebar .audit-link{min-height:44px;padding:11px 6px;}
    .btn,.btn.ghost,.btn.danger,.btn.gold{min-height:44px;padding:10px 16px;font-size:13px;}
    .search-result{min-height:44px;padding:12px 14px;}
    .field-inline{min-height:40px;font-size:16px;padding:9px 10px;} /* 16px avoids iOS Safari auto-zoom on focus */

    /* Modal: never exceed the screen, close button stays visible, content scrolls internally */
    .modal-overlay{padding:0;align-items:flex-end;}
    .modal{
      max-width:100%;width:100%;border-radius:16px 16px 0 0;
      max-height:min(88vh,88dvh);
      display:flex;flex-direction:column;overflow:hidden;
      padding:20px 18px;
      padding-bottom:calc(env(safe-area-inset-bottom,0px) + 20px);
      padding-left:calc(env(safe-area-inset-left,0px) + 18px);
      padding-right:calc(env(safe-area-inset-right,0px) + 18px);
    }
    .modal .close{width:40px;height:40px;min-width:40px;min-height:40px;font-size:15px;top:14px;left:14px;flex-shrink:0;}
    #modalBody{overflow-y:auto;-webkit-overflow-scrolling:touch;overflow-x:auto;padding-top:8px;}
  }

  @media(min-width:761px) and (max-width:1024px){
    /* iPad: keep the desktop layout, just tighten spacing slightly */
    main{padding:22px 20px 50px;}
  }

  .card{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:16px;max-width:100%;overflow-x:auto;-webkit-overflow-scrolling:touch;}
  .stat-card .label{font-size:11.5px;color:var(--muted);margin-bottom:7px;}
  .stat-card .value{font-family:'Cairo';font-weight:800;font-size:25px;color:var(--teal-deep);}
  .stat-card.red .value{color:var(--red);} .stat-card.amber .value{color:var(--amber);} .stat-card.green .value{color:var(--green);}

  .section-title{font-family:'Cairo';font-weight:700;font-size:14.5px;color:var(--teal-deep);margin:20px 0 10px;display:flex;align-items:center;gap:7px;}
  .section-title .n{background:var(--gold-soft);color:var(--gold);width:20px;height:20px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:10.5px;font-weight:800;}

  table{width:100%;border-collapse:collapse;font-size:12.5px;}
  th{text-align:right;color:var(--muted);font-weight:600;padding:8px 9px;border-bottom:1.5px solid var(--line);font-size:11.5px;}
  td{padding:9px 9px;border-bottom:1px solid var(--line);}
  tr:last-child td{border-bottom:none;}
  .pill{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;}
  .pill.green{background:var(--green-soft);color:var(--green);} .pill.amber{background:var(--amber-soft);color:var(--amber);} .pill.red{background:var(--red-soft);color:var(--red);}
  .dot{width:8px;height:8px;border-radius:50%;display:inline-block;}
  .dot.green{background:var(--green);} .dot.amber{background:var(--amber);} .dot.red{background:var(--red);}

  .dept-card{cursor:pointer;transition:transform .12s;} .dept-card:hover{transform:translateY(-2px);}
  .dept-card .name{font-family:'Cairo';font-weight:700;font-size:13.5px;margin-bottom:4px;}
  .dept-card .mgr{font-size:11.5px;color:var(--muted);margin-bottom:9px;}
  .bar-bg{background:var(--teal-soft);border-radius:20px;height:7px;overflow:hidden;} .bar-fill{height:100%;border-radius:20px;background:var(--teal);}
  .pct{font-size:11.5px;font-weight:700;color:var(--teal-deep);margin-top:5px;}

  .roleguard{background:var(--gold-soft);border:1px dashed var(--gold);border-radius:11px;padding:13px 15px;font-size:12.5px;color:#7a5f0e;margin-bottom:16px;}
  .subtle{color:var(--muted);font-size:11.5px;}
  .alert-row{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:9px;background:var(--red-soft);margin-bottom:7px;font-size:12.5px;}
  .alert-row .ic{color:var(--red);font-size:14px;}

  .modal-overlay{position:fixed;inset:0;background:rgba(14,46,44,.55);display:none;align-items:flex-start;justify-content:center;padding:36px 16px;z-index:80;overflow-y:auto;-webkit-overflow-scrolling:touch;}
  .modal-overlay.open{display:flex;}
  .modal{background:var(--card);border-radius:15px;max-width:min(680px,100%);width:100%;padding:24px 26px;position:relative;}
  .modal .close{position:absolute;left:16px;top:16px;background:var(--teal-soft);border:none;width:28px;height:28px;border-radius:8px;cursor:pointer;font-size:14px;color:var(--teal-deep);}
  .kv{display:grid;grid-template-columns:115px 1fr;gap:7px 10px;font-size:12.5px;margin-bottom:7px;}
  .kv .k{color:var(--muted);}

  .field-inline{padding:6px 8px;border:1px solid var(--line);border-radius:6px;font-family:inherit;font-size:12px;}
  .btn{background:var(--teal-deep);color:#fff;border:none;padding:8px 15px;border-radius:8px;font-family:inherit;font-weight:700;font-size:12px;cursor:pointer;}
  .btn.ghost{background:var(--teal-soft);color:var(--teal-deep);}
  .btn.danger{background:var(--red-soft);color:var(--red);}
  .btn.gold{background:var(--gold);color:var(--teal-deep);}

  .footer-note{margin-top:36px;color:var(--muted);font-size:11px;text-align:center;}
  .tabpage{display:none;} .tabpage.active{display:block;}
</style>
</head>
<body>

<button class="hamburger" id="hamburgerBtn" onclick="toggleSidebar()" aria-label="فتح القائمة">☰</button>
<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

<div class="app">
<nav class="sidebar" id="sidebarNav">
  <div class="brand">
    <div class="mark">ص.ب</div>
    <div><div class="t1">دائرة صحة البصرة</div><div class="t2">منصة الحوكمة المؤسسية</div></div>
  </div>
  <div class="divider"></div>

  <div class="navitem active" data-page="home" onclick="goTo('home')"><span class="ic">🏠</span> الرئيسية</div>

  <div class="navlabel">غرف الأقسام</div>
  <div id="deptNavList"></div>

  <div class="navlabel">البيانات المركزية</div>
  <div class="navitem" data-page="staff" onclick="goTo('staff')"><span class="ic">👥</span> الكوادر</div>
  <div class="navitem" data-page="medequip" onclick="goTo('medequip')"><span class="ic">🩺</span> الأجهزة الطبية</div>
  <div class="navitem" data-page="svcequip" onclick="goTo('svcequip')"><span class="ic">🔧</span> الأجهزة الخدمية</div>
  <div class="navitem" data-page="projects" onclick="goTo('projects')"><span class="ic">📁</span> المشاريع</div>
  <div class="navitem" data-page="contracts" onclick="goTo('contracts')"><span class="ic">📄</span> العقود</div>
  <div class="navitem" data-page="kpi" onclick="goTo('kpi')"><span class="ic">📊</span> المؤشرات</div>
  <div class="navitem" data-page="decisions" onclick="goTo('decisions')"><span class="ic">🗂️</span> القرارات</div>

  <div class="foot">
    <div class="divider"></div>
    <div class="audit-link" onclick="openAuditModal()"><span>📝</span> سجل التدقيق</div>
  </div>
</nav>

<main>
  <header class="topbar">
    <div>
      <div class="page-title" id="pageTitle">الصفحة الرئيسية</div>
      <div class="page-sub" id="pageSub">لوحة القيادة العامة لدائرة صحة البصرة</div>
    </div>
    <div class="rolebar">
      <div class="search-wrap">
        <input id="searchInput" type="text" placeholder="🔍 ابحثي عن أي شيء، أو اسألي: مجموع الصيادلة">
        <div class="search-results" id="searchResults"></div>
      </div>
      <span class="who">الدخول كـ</span>
      <select id="roleSelect" onchange="onRoleChange()">
        <option value="dg">المدير العام</option>
        <option value="deptHead">مدير قسم</option>
      </select>
      <select id="deptScopeSelect" style="display:none"></select>
    </div>
  </header>

  <section class="tabpage active" id="page-home"></section>
  <section class="tabpage" id="page-room"></section>
  <section class="tabpage" id="page-staff"></section>
  <section class="tabpage" id="page-medequip"></section>
  <section class="tabpage" id="page-svcequip"></section>
  <section class="tabpage" id="page-projects"></section>
  <section class="tabpage" id="page-contracts"></section>
  <section class="tabpage" id="page-kpi"></section>
  <section class="tabpage" id="page-decisions"></section>

  <div class="footer-note">منصة الحوكمة المؤسسية — دائرة صحة البصرة</div>
</main>
</div>

<div class="modal-overlay" id="modal"><div class="modal"><button class="close" onclick="closeModal()">✕</button><div id="modalBody"></div></div></div>

<script>

function escapeHtml(s){ return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function todayStr(){ const n=new Date(); return n.getFullYear()+'/'+String(n.getMonth()+1).padStart(2,'0')+'/'+String(n.getDate()).padStart(2,'0'); }
function parseDate(s){ if(!s) return null; const p=s.split('/').map(x=>parseInt(x,10)); if(p.length!==3||p.some(isNaN)) return null; return new Date(p[0],p[1]-1,p[2]); }
function daysBetween(dateStr){ const d=parseDate(dateStr); if(!d) return null; const now=new Date(); now.setHours(0,0,0,0); return Math.round((d-now)/86400000); }

];
function normalizeCategory(label){ for(const c of STAFF_CANON){ if(c.test.test(label)) return c.key; } return 'أخرى'; }
function aggregateStaffTotals(){
  const map = {};
  staffStats.forEach(s=>s.categories.forEach(c=>{
    const key = normalizeCategory(c.label);
    if(!map[key]) map[key] = {total:0, byInst:{}};
    map[key].total += c.count;
    map[key].byInst[s.institutionId] = (map[key].byInst[s.institutionId]||0) + c.count;
  }));
  return map;
}
function staffOverallLastUpdate(){
  let best=null, bestD=null;
  staffStats.forEach(s=>{ const d=parseDate(s.lastUpdate); if(d && (!bestD||d>bestD)){bestD=d;best=s.lastUpdate;} });
  return best || '—';
}
function isStaffFresh(s){ const d=daysBetween(s.lastUpdate); return d!==null && d>=-30; }

  const d = daysBetween(endDate);
  if(d===null) return {label:'—', cls:'amber'};
  if(progress>=100) return {label:'منجز', cls:'green'};
  if(d<0) return {label:`متأخر ${Math.abs(d)} يوم`, cls:'red'};
  if(d<=14) return {label:`باقٍ ${d} يوم`, cls:'amber'};
  return {label:`باقٍ ${d} يوم`, cls:'green'};
}

  decisions.filter(d=>d.delayed).forEach(d=> list.push({text:`قرار لم يُنفَّذ في موعده: ${d.text}`, deptId:d.deptId, severity:'warning'}));
  staffStats.forEach(s=> s.categories.filter(c=>c.count===0 && /أطباء|تمريض/.test(c.label)).forEach(c=>
    list.push({text:`نقص كوادر حرج: "${c.label}" بعدد صفر في ${instName(s.institutionId)}`, deptId:s.ownerDept, severity:'critical'})));
  return list;
}

function renderDeptNav(){
  document.getElementById('deptNavList').innerHTML = departments.map(d=>
    `<div class="navitem" data-page="room-${d.id}" onclick="goToRoom('${d.id}')"><span class="ic">🏢</span> ${d.name}</div>`
  ).join('');
}

function setActiveNav(page){
  document.querySelectorAll('.navitem').forEach(n=>n.classList.toggle('active', n.dataset.page===page));
}

function goTo(page){
  currentRoom = null;
  setActiveNav(page);
  document.querySelectorAll('.tabpage').forEach(s=>s.classList.remove('active'));
  document.getElementById('page-'+page).classList.add('active');
  const t = PAGE_TITLES[page] || ['',''];
  document.getElementById('pageTitle').textContent = t[0];
  document.getElementById('pageSub').textContent = t[1];
  ({home:renderHome, staff:renderStaff, medequip:()=>renderEquip('medical'), svcequip:()=>renderEquip('service'),
    projects:renderProjects, contracts:renderContracts, kpi:renderKpi, decisions:renderDecisions})[page]();
  closeSidebar();
}

function goToRoom(deptId){
  currentRoom = deptId;
  setActiveNav('room-'+deptId);
  document.querySelectorAll('.tabpage').forEach(s=>s.classList.remove('active'));
  document.getElementById('page-room').classList.add('active');
  const d = deptById(deptId);
  document.getElementById('pageTitle').textContent = d.name;
  document.getElementById('pageSub').textContent = 'غرفة قيادة القسم — اختصاصه فقط';
  renderRoom(deptId);
  closeSidebar();
}

/* Off-canvas drawer (mobile/tablet only — CSS keeps this fully inert on desktop) */
function toggleSidebar(){
  document.getElementById('sidebarNav').classList.toggle('sidebar-open');
  document.getElementById('sidebarOverlay').classList.toggle('open');
}
function openSidebar(){
  document.getElementById('sidebarNav').classList.add('sidebar-open');
  document.getElementById('sidebarOverlay').classList.add('open');
}
function closeSidebar(){
  document.getElementById('sidebarNav').classList.remove('sidebar-open');
  document.getElementById('sidebarOverlay').classList.remove('open');
}

/* ================================================================

================================================================ */
function roomHeader(d){
  return `<div class="card" style="margin-bottom:16px;">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px;">
      <div>

    </div>

      <div class="kv" style="grid-template-columns:1fr;"><div class="k">الخطة</div><div>${d.plan}</div></div>
      <div class="kv" style="grid-template-columns:1fr;"><div class="k">المعوقات</div><div>${d.obstacles}</div></div>

function renderRoom(deptId){
  const d = deptById(deptId);
  const el = document.getElementById('page-room');
  el.innerHTML = roomHeader(d) + roomBody(deptId);
}

function roomBody(deptId){
  switch(deptId){
    case 'planning': return roomPlanning();
    case 'inspection': return roomInspection();
    case 'technical': return roomTechnical();
    case 'engineering': return roomEngineering();
    case 'publichealth': return roomPublicHealth();
    case 'pharmacy': return roomPharmacy();
    case 'operations': return roomOperations();
    case 'audit': return roomAudit();
    case 'adminlegal': return roomAdminLegal();
    default: return '<p class="subtle">لا يوجد محتوى.</p>';
  }
}

  return `
    <div class="grid g4" style="margin-bottom:14px;">
      ${indicatorTile('عدد المستشفيات', institutions.filter(i=>i.critical).length)}
      ${indicatorTile('عدد المراكز الصحية', institutions.filter(i=>!i.critical).length)}
      ${indicatorTile('إجمالي الأسرّة', institutions.reduce((a,i)=>a+i.beds,0))}

    <div class="card"><table><thead><tr><th>التصنيف</th><th>المجموع</th></tr></thead>
      <tbody>${order.map(k=>`<tr><td>${k}</td><td><b>${agg[k]?agg[k].total:0}</b></td></tr>`).join('')}</tbody>

    <div class="card"><table><thead><tr><th>القسم</th><th>الإنجاز</th></tr></thead>

    </table></div>
  `;
}

/* ================================================================
   GLOBAL SEARCH — the primary way to reach information (not an
   afterthought): lexical matches + aggregate-query understanding,
   answered with a number, a mini chart, a compact table, and a
   direct link back to the single source.
================================================================ */
function detectAggregate(q){
  if(!/مجموع|عدد/.test(q)) return null;
  const staffMap = [
    {t:/صيدل/, key:'الصيادلة'}, {t:/ممرض|تمريض/, key:'التمريض'}, {t:/أسنان/, key:'أطباء الأسنان'}, {t:/اختصاص/, key:'أطباء الاختصاص'},
  ];
  for(const m of staffMap){ if(m.t.test(q)) return {kind:'staff', key:m.key}; }
  if(/عاطل/.test(q)) return {kind:'equipBroken', ct:/ct/i.test(q)};
  if(/متلكئ/.test(q)) return {kind:'stalled'};
  if(/المجالس التحقيقية|مجالس تحقيقية/.test(q)){
    let s=null; if(/قيد الإنجاز/.test(q)) s='قيد الإنجاز'; else if(/متأخر/.test(q)) s='متأخر'; else if(/مكتمل/.test(q)) s='مكتمل';
    return {kind:'councils', status:s};
  }
  if(/تسرب/.test(q)) return {kind:'dropout'};
  return null;
}
function aggregateAnswer(agg){
  if(agg.kind==='staff'){
    const data = aggregateStaffTotals()[agg.key];
    const total = data?data.total:0;
    const byInst = data?data.byInst:{};
    return {title:`مجموع ${agg.key} في دائرة صحة البصرة`, total, source:'صفحة الكوادر المركزية', last:staffOverallLastUpdate(),
      rows:Object.entries(byInst).map(([id,c])=>({label:instName(id), value:c})), openPage:'staff'};
  }
  if(agg.kind==='equipBroken'){
    let items=[...medicalEquipment,...serviceEquipment];
    if(agg.ct) items=items.filter(e=>/ct/i.test(e.name)||/ct/i.test(e.category));
    const total = items.reduce((a,e)=>a+e.broken,0);
    return {title:`عدد ${agg.ct?'CT ':''}الأجهزة العاطلة`, total, source:'الأجهزة الطبية والخدمية', last:'—',
      rows:items.filter(e=>e.broken>0).map(e=>({label:`${e.name} — ${instName(e.institutionId)}`, value:e.broken})), openPage:'medequip'};
  }
  if(agg.kind==='stalled'){
    const items = projects.filter(p=>p.status==='red');
    return {title:'المشاريع المتلكئة', total:items.length, source:'المشاريع', last:'—',
      rows:items.map(p=>({label:p.name, value:p.progress+'%'})), openPage:'projects'};
  }
  if(agg.kind==='councils'){
    const items = agg.status ? inspectionCouncils.filter(c=>c.status===agg.status) : inspectionCouncils;
    return {title:'المجالس التحقيقية'+(agg.status?' — '+agg.status:''), total:items.length, source:'قسم التفتيش', last:'—',
      rows:items.map(c=>({label:c.subject, value:c.status})), openPage:null, openRoom:'inspection'};
  }
  if(agg.kind==='dropout'){
    const total = publicHealthPrograms.reduce((a,p)=>a+p.dropout,0);
    return {title:'المتسربون من اللقاحات', total, source:'قسم الصحة العامة', last:'—',
      rows:publicHealthPrograms.map(p=>({label:p.campaign+' — '+p.area, value:p.dropout})), openPage:null, openRoom:'publichealth'};
  }
  return null;
}

function runSearch(){
  const q = document.getElementById('searchInput').value.trim();
  const box = document.getElementById('searchResults');
  if(!q){ box.style.display='none'; box.innerHTML=''; return; }
  const ql = q.toLowerCase();
  const agg = detectAggregate(q);
  const aggAnswer = agg ? aggregateAnswer(agg) : null;

  const results = [];
  departments.forEach(d=>{ if(d.name.toLowerCase().includes(ql)||d.manager.toLowerCase().includes(ql)) results.push({type:'قسم', name:d.name, related:d.manager, action:`goToRoom('${d.id}')`}); });
  institutions.forEach(i=>{ if(i.name.toLowerCase().includes(ql)) results.push({type:'مؤسسة', name:i.name, related:i.critical?'مستشفى':'مركز صحي', action:`goTo('staff')`}); });
  staffStats.forEach(s=>s.categories.forEach(c=>{ if(c.label.toLowerCase().includes(ql)) results.push({type:'كوادر', name:c.label, related:instName(s.institutionId)+' — '+c.count+' فرد', action:`goTo('staff')`}); }));
  projects.forEach(p=>{ if(p.name.toLowerCase().includes(ql)) results.push({type:'مشروع', name:p.name, related:deptName(p.deptId)+' — '+p.progress+'%', action:`goTo('projects')`}); });
  contracts.forEach(c=>{ if(c.name.toLowerCase().includes(ql)||c.contractor.toLowerCase().includes(ql)) results.push({type:'عقد', name:c.name, related:c.contractor, action:`goTo('contracts')`}); });
  [...medicalEquipment,...serviceEquipment].forEach(e=>{ if(e.name.toLowerCase().includes(ql)||e.category.toLowerCase().includes(ql)) results.push({type:'جهاز', name:e.name, related:instName(e.institutionId)+' — '+opLabel(e.opStatus), action:`goTo('${medicalEquipment.includes(e)?'medequip':'svcequip'}')`}); });
  decisions.forEach(d=>{ if(d.text.toLowerCase().includes(ql)) results.push({type:'قرار', name:d.text, related:deptName(d.deptId), action:`goTo('decisions')`}); });

  box.style.display='block';
  let html='';
  if(aggAnswer){
    html += `<div style="background:var(--gold-soft);padding:14px;border-bottom:2px solid var(--gold);">
      <div style="font-family:'Cairo';font-weight:800;font-size:13.5px;">${aggAnswer.title}</div>
      <div style="font-family:'Cairo';font-weight:800;font-size:26px;color:var(--teal-deep);margin:5px 0;">${aggAnswer.total}</div>
      <div class="subtle">المصدر: ${aggAnswer.source}${aggAnswer.last!=='—'?' · آخر تحديث: '+aggAnswer.last:''}</div>
      <canvas id="aggChart" height="90" style="margin-top:8px;"></canvas>
      <table style="margin-top:6px;font-size:11px;background:#fff;border-radius:8px;overflow:hidden;">${aggAnswer.rows.map(r=>`<tr><td style="padding:5px 8px;">${r.label}</td><td style="padding:5px 8px;text-align:left;">${r.value}</td></tr>`).join('')||'<tr><td class="subtle" style="padding:8px;">لا توجد بيانات.</td></tr>'}</table>
      <button class="btn" style="margin-top:9px;font-size:11px;" onclick="${aggAnswer.openPage?`goTo('${aggAnswer.openPage}')`:`goToRoom('${aggAnswer.openRoom}')`};closeSearch();">الانتقال إلى المصدر ›</button>
    </div>`;
  }
  html += results.slice(0,15).map(r=>`
    <div class="search-result" onclick="${r.action};closeSearch();">
      <span class="pill amber" style="font-size:9.5px;">${r.type}</span>
      <div style="font-weight:600;font-size:12.5px;margin-top:4px;">${escapeHtml(r.name)}</div>
      <div class="subtle">${escapeHtml(r.related)}</div>
    </div>`).join('') || (aggAnswer?'':'<div class="subtle" style="padding:12px;">لا توجد نتائج.</div>');
  box.innerHTML = html;

  if(aggAnswer && aggAnswer.rows.length){
    setTimeout(()=>{
      const ctx = document.getElementById('aggChart');
      if(!ctx) return;
      if(charts.agg) charts.agg.destroy();
      charts.agg = new Chart(ctx, {type:'bar', data:{labels:aggAnswer.rows.map(r=>r.label), datasets:[{data:aggAnswer.rows.map(r=>parseInt(r.value)||0), backgroundColor:'#175B57'}]},
        options:{plugins:{legend:{display:false}}, scales:{x:{ticks:{font:{size:9}}}}}});
    }, 30);
  }
}
function closeSearch(){ document.getElementById('searchResults').style.display='none'; document.getElementById('searchInput').value=''; }

function onRoleChange(){
  currentRole = document.getElementById('roleSelect').value;
  const sel = document.getElementById('deptScopeSelect');
  sel.style.display = currentRole==='deptHead' ? 'inline-block' : 'none';
  if(currentRole==='deptHead'){
    sel.innerHTML = departments.map(d=>`<option value="${d.id}">${d.name}</option>`).join('');
    currentDeptScope = sel.value;
  }
  if(currentRoom) goToRoom(currentRoom);
  else { const active=document.querySelector('.navitem.active'); goTo(active?active.dataset.page:'home'); }
}

renderDeptNav();
document.getElementById('deptScopeSelect').addEventListener('change', function(){ currentDeptScope=this.value; if(currentRoom) goToRoom(currentRoom); });
document.getElementById('searchInput').addEventListener('input', runSearch);
document.addEventListener('click', (e)=>{ if(!e.target.closest('.search-wrap')) document.getElementById('searchResults').style.display='none'; });
goTo('home');
